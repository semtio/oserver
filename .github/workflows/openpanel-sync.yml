name: OpenPanel Sync

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone config
        shell: bash
        env:
          RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
          RCLONE_CONF_FALLBACK: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          python - <<'PY'
          import os
          from pathlib import Path

          config_text = os.environ.get('RCLONE_CONFIG_CONTENT', '').strip()
          if not config_text:
              config_text = os.environ.get('RCLONE_CONF_FALLBACK', '').strip()
          if not config_text:
              raise SystemExit('RCLONE_CONFIG/RCLONE_CONF secret is empty')

          config_dir = Path.home() / '.config' / 'rclone'
          config_dir.mkdir(parents=True, exist_ok=True)
          config_path = config_dir / 'rclone.conf'
          config_path.write_text(config_text + '\n', encoding='utf-8')
          if '[gdrive]' not in config_text:
              raise SystemExit('rclone config does not contain [gdrive] section')
          print(f'Wrote rclone config to {config_path}')
          PY

      - name: Verify rclone remote
        shell: bash
        env:
          RCLONE_CONFIG: ~/.config/rclone/rclone.conf
        run: |
          rclone config file
          rclone listremotes
          rclone listremotes | grep -Fx 'gdrive:'

      - name: Run sync script
        env:
          RCLONE_CONFIG: ~/.config/rclone/rclone.conf
          RCLONE_SERVICE_ACCOUNT_JSON: ${{ secrets.RCLONE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/sync_openpanel.py --config config/openpanel.json

      - name: Commit updated version
        shell: bash
        run: |
          if git diff --quiet -- data/version.txt data/state.json; then
            echo "No repository state changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/version.txt data/state.json
          git commit -m "chore: update OpenPanel sync state"
          git push
